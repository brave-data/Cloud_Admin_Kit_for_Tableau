name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        バグ報告ありがとうございます。日本語でも構いません。

  - type: textarea
    id: description
    attributes:
      label: "What happened? / 何が起きましたか？"
      description: "A clear description of the bug."
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce / 再現手順"
      placeholder: |
        1. Open the app
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior / 期待する動作"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment / 環境"
      value: |
        - OS:
        - Python version:
        - tableauserverclient version:
        - Tableau Cloud version (if known):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / エラーログ"
      description: "Paste any error output from the terminal."
      render: shell
