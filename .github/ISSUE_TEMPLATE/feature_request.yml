name: "💡 Feature Request"
description: "Suggest a new feature or improvement"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome! / 機能リクエスト歓迎です。日本語でも構いません。

  - type: textarea
    id: problem
    attributes:
      label: "Problem / 課題"
      description: "What problem does this feature solve?"
      placeholder: "As a Tableau admin, I often need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution / 提案する解決策"
      description: "How would you like this to work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered / 検討した代替案"
      description: "Any other approaches you've thought about?"

  - type: dropdown
    id: priority
    attributes:
      label: "Priority / 優先度"
      options:
        - "Nice to have"
        - "Important"
        - "Critical"
    validations:
      required: true
